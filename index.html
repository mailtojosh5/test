<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Jenkins Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #0f172a;
  color: white;
}

header {
  padding: 20px;
  text-align: center;
  font-size: 24px;
  background: #5b6ee1;
}

.container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 15px;
  padding: 20px;
}

.card {
  background: #1e293b;
  padding: 15px;
  border-radius: 10px;
  cursor: pointer;
}

.pass {
  font-size: 28px;
  font-weight: bold;
  color: #22d3ee;
}

.fail {
  color: #ef4444;
}

canvas {
  margin-top: 10px;
}
</style>
</head>

<body>

<header>📊 Jenkins Cucumber Dashboard</header>

<div class="container" id="container"></div>

<script>

/*
----------------------------------
CONFIG (IMPORTANT)
----------------------------------
Replace with YOUR Jenkins URLs
Must allow CORS or be public
*/

const jobs = [
{
  id: "job1",
  name: "TypeScript Hybrid",
  url: "http://localhost:8080/job/TypeScriptHybridAllureFramework/lastSuccessfulBuild/artifact/cucumber.json"
},
{
  id: "job2",
  name: "API Automation",
  url: "http://localhost:8080/job/TypeScriptHybridAllureFramework/lastSuccessfulBuild/artifact/cucumber.json"
}
];

/*
----------------------------------
FETCH JSON (NO AXIOS / NO BACKEND)
----------------------------------
*/

async function fetchJson(url) {
  const res = await fetch(url, {
    method: "GET",
    headers: {
      "Accept": "application/json"
    }
  });

  if (!res.ok) {
    throw new Error("HTTP " + res.status);
  }

  return await res.json();
}

/*
----------------------------------
PARSE CUCUMBER
----------------------------------
*/

function parse(data) {

  let total = 0;
  let passed = 0;
  let failed = 0;
  let skipped = 0;

  data.forEach(f => {

    if (!f.elements) return;

    f.elements.forEach(s => {

      total++;

      const statuses = s.steps.map(st => st.result.status);

      if (statuses.includes("failed")) failed++;
      else if (
        statuses.includes("skipped") ||
        statuses.includes("pending")
      ) skipped++;
      else passed++;

    });

  });

  return { total, passed, failed, skipped };
}

/*
----------------------------------
LOAD DASHBOARD
----------------------------------
*/

async function load() {

  const container = document.getElementById("container");
  container.innerHTML = "";

  for (const job of jobs) {

    try {

      const data = await fetchJson(job.url);
      const stats = parse(data);

      const passRate =
        stats.total > 0
          ? ((stats.passed / stats.total) * 100).toFixed(2)
          : 0;

      const card = document.createElement("div");
      card.className = "card";

      card.innerHTML = `
        <h3>${job.name}</h3>
        <div class="pass">${passRate}%</div>
        <div>Total: ${stats.total}</div>
        <div class="fail">Failed: ${stats.failed}</div>
        <canvas id="chart-${job.id}"></canvas>
      `;

      container.appendChild(card);

      new Chart(document.getElementById(`chart-${job.id}`), {
        type: "doughnut",
        data: {
          labels: ["Passed", "Failed", "Skipped"],
          datasets: [{
            data: [stats.passed, stats.failed, stats.skipped]
          }]
        }
      });

    } catch (err) {

      const card = document.createElement("div");
      card.className = "card";

      card.innerHTML = `
        <h3>${job.name}</h3>
        <div class="fail">ERROR: ${err.message}</div>
      `;

      container.appendChild(card);
    }
  }
}

load();
setInterval(load, 60000);

</script>

</body>
</html>
