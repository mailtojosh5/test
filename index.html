<!DOCTYPE html>
<html>
<head>
<title>Jenkins DevOps Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

header {
  background: #5b6ee1;
  padding: 20px;
  text-align: center;
  font-size: 22px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 15px;
  padding: 20px;
}

.card {
  background: #1e293b;
  padding: 15px;
  border-radius: 10px;
}

.pass {
  font-size: 28px;
  color: #22d3ee;
}

.fail {
  color: #ef4444;
}
</style>
</head>

<body>

<header>🚀 Production Jenkins Dashboard</header>

<div class="grid" id="grid"></div>

<script>

/*
----------------------------------
POINT TO PROXY SERVER
----------------------------------
*/
const API = "http://localhost:3000/api/jobs";

async function load() {

  const res = await fetch(API);
  const jobs = await res.json();

  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  jobs.forEach(job => {

    const div = document.createElement("div");
    div.className = "card";

    if (job.error) {
      div.innerHTML = `<h3>${job.name}</h3><div class="fail">Error loading data</div>`;
    } else {
      div.innerHTML = `
        <h3>${job.name}</h3>
        <div class="pass">${job.passRate}%</div>
        <div>Total: ${job.total}</div>
        <div>Passed: ${job.passed}</div>
        <div>Failed: ${job.failed}</div>
      `;
    }

    grid.appendChild(div);
  });
}

load();
setInterval(load, 60000);

</script>

</body>
</html>
